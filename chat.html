<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #351c75;
    color: white;
    display: flex;
    height: 100vh;
  }

  #users {
    width: 30%;
    background: #2a155c;
    padding: 10px;
    overflow-y: auto;
  }

  #chat {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
  }

  .msg {
    padding: 10px;
    border-radius: 15px;
    margin-top: 10px;
    max-width: 70%;
    background: gray;
    color: white;
  }

  .admin {
    background: #351c75;
  }

  .inputBox {
    display: flex;
    padding: 10px;
    background: white;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
  }

  button {
    margin-left: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #351c75;
    color: white;
    cursor: pointer;
  }
  </style>
</head>

<body>

<div id="users"></div>

<div id="chat">
  <div id="messages"></div>

  <div class="inputBox">
    <input id="msgInput" placeholder="Mensaje...">
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  databaseURL: "https://tss-members-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const admin = "crispin.qb@gmail.com";

let currentUser = null;
let chatActual = null;

// 🔐 LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  cargarUsuarios();
});

// 👥 LISTA DE USUARIOS (TODOS)
function cargarUsuarios() {
  onValue(ref(db, 'usuarios'), (snapshot) => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "<h3>Usuarios</h3>";

    snapshot.forEach((child) => {
      const data = child.val();
      const uid = child.key;

      // ❌ no mostrarse a sí mismo
      if (uid === currentUser.uid) return;

      const div = document.createElement("div");
      div.innerText = data.email;
      div.style.cursor = "pointer";
      div.style.marginTop = "10px";

      div.onclick = () => {
        chatActual = generarChatID(currentUser.uid, uid);
        cargarMensajes(chatActual);
      };

      usersDiv.appendChild(div);
    });
  });
}

// 🔑 GENERAR CHAT PRIVADO (IMPORTANTE)
function generarChatID(uid1, uid2) {
  return uid1 < uid2 ? uid1 + "_" + uid2 : uid2 + "_" + uid1;
}

// 💬 MENSAJES
function cargarMensajes(chatID) {
  onValue(ref(db, 'chats/' + chatID), (snapshot) => {
    const container = document.getElementById("messages");
    container.innerHTML = "";

    snapshot.forEach((child) => {
      const data = child.val();

      const div = document.createElement("div");
      div.className = "msg";

      if (data.usuario === admin) {
        div.classList.add("admin");
      }

      div.innerHTML = `
        <b>${data.usuario}</b><br>
        ${data.texto}
      `;

      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
}

// 📤 ENVIAR
window.enviar = function() {
  const texto = document.getElementById("msgInput").value;

  if (!texto || !chatActual) {
    alert("Selecciona un usuario primero 💀");
    return;
  }

  push(ref(db, 'chats/' + chatActual), {
    usuario: currentUser.email,
    texto: texto,
    fecha: Date.now()
  });

  document.getElementById("msgInput").value = "";
};
</script>

</body>
</html>
