<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #351c75;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* 🔝 TOP BAR */
  .topBar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px;
  }

  .volver {
    background: white;
    color: #351c75;
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
  }

  h2 {
    margin: 0 auto;
  }

  /* MAIN */
  .main {
    display: flex;
    flex: 1;
  }

  #users {
    width: 30%;
    background: #2a155c;
    padding: 10px;
    overflow-y: auto;
  }

  #chat {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
  }

  /* 💬 MENSAJES */
  .msg {
    padding: 10px;
    border-radius: 15px;
    margin-top: 10px;
    max-width: 70%;
    align-self: flex-start;
    background: gray;
    color: white;
  }

  .admin {
    background: #351c75;
  }

  /* 👥 USERS */
  .user {
    padding: 8px;
    border-radius: 10px;
    margin-top: 5px;
    cursor: pointer;
  }

  .user:hover {
    background: rgba(255,255,255,0.2);
  }

  .selected {
    background: white;
    color: #351c75;
  }

  /* INPUT */
  .inputBox {
    display: flex;
    padding: 10px;
    background: white;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
  }

  button {
    margin-left: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #351c75;
    color: white;
    cursor: pointer;
  }
  </style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="topBar">
  <button class="volver" onclick="window.location.href='miembros.html'">
    ⬅ Volver
  </button>

  <h2>Chat 💬</h2>
</div>

<div class="main">

  <div id="users"></div>

  <div id="chat">
    <div id="messages"></div>

    <div class="inputBox">
      <input id="msgInput" placeholder="Mensaje...">
      <button onclick="enviar()">Enviar</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  databaseURL: "https://tss-members-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const admin = "crispin.qb@gmail.com";

let currentUser = null;
let chatActual = null;
let selectedDiv = null;

// 🔐 LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  cargarUsuarios();
});

// 👥 USUARIOS
function cargarUsuarios() {
  onValue(ref(db, 'usuarios'), (snapshot) => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "<h3>Usuarios</h3>";

    snapshot.forEach((child) => {
      const data = child.val();
      const uid = child.key;

      if (uid === currentUser.uid) return;

      const div = document.createElement("div");
      div.innerText = data.email;
      div.className = "user";

      div.onclick = () => {
        chatActual = generarChatID(currentUser.uid, uid);
        cargarMensajes(chatActual);

        // 🔥 RESALTAR
        if (selectedDiv) {
          selectedDiv.classList.remove("selected");
        }

        div.classList.add("selected");
        selectedDiv = div;
      };

      usersDiv.appendChild(div);
    });
  });
}

// 🔑 CHAT ID
function generarChatID(uid1, uid2) {
  return uid1 < uid2 ? uid1 + "_" + uid2 : uid2 + "_" + uid1;
}

// 💬 MENSAJES
function cargarMensajes(chatID) {
  onValue(ref(db, 'chats/' + chatID), (snapshot) => {
    const container = document.getElementById("messages");
    container.innerHTML = "";

    snapshot.forEach((child) => {
      const data = child.val();

      const div = document.createElement("div");
      div.className = "msg";

      if (data.usuario.toLowerCase() === admin) {
        div.classList.add("admin");
      }

      div.innerHTML = `
        <b>${data.usuario}</b><br>
        ${data.texto}
      `;

      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
}

// 📤 ENVIAR
window.enviar = function() {
  const texto = document.getElementById("msgInput").value;

  if (!texto || !chatActual) {
    alert("Selecciona un usuario primero 💀");
    return;
  }

  push(ref(db, 'chats/' + chatActual), {
    usuario: currentUser.email,
    texto: texto,
    fecha: Date.now()
  });

  document.getElementById("msgInput").value = "";
};
</script>

</body>
</html>
