<!DOCTYPE html>
<html>
<head>
  <title> SATFF LOGIN </title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #351c75, #5f2c82);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    color: white;
    width: 300px;
    animation: fadeIn 0.8s ease;
  }

  h2 {
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
  }

  input:focus {
    box-shadow: 0 0 10px #ffffff;
  }

  button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: white;
    color: #351c75;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    background: #f0f0f0;
  }

  #mensaje {
    margin-top: 10px;
    font-size: 12px;
    color: #ffdddd;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  </style>

</head>

<body>

<div class="container">

<h2>Bienvenido al STAFF PANEL </h2>

<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p id="mensaje"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  projectId: "tss-members",
  storageBucket: "tss-members.firebasestorage.app",
  messagingSenderId: "472380736056",
  appId: "1:472380736056:web:a9c72354561c9803881ccd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "miembros.html";
    })
    .catch((error) => {
      document.getElementById("mensaje").innerText = error.message;
    });
}
</script>

</body>
</html>
