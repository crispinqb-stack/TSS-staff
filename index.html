<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body>

<h2>Login 🔐</h2>

<input type="email" id="email" placeholder="Correo"><br>
<input type="password" id="password" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  databaseURL: "https://tss-members-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      // 🔥 FORZAR GUARDADO
      set(ref(db, 'usuarios/' + user.uid), {
        email: user.email
      })
      .then(() => {
        alert("GUARDADO EN DATABASE 🔥");
        window.location.href = "miembros.html";
      })
      .catch((error) => {
        alert("ERROR: " + error.message);
      });

    })
    .catch((error) => {
      alert("LOGIN ERROR: " + error.message);
    });
}
</script>

</body>
</html>
