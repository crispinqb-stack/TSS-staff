<!DOCTYPE html>
<html>
<head>
  <title>Contenido secreto</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #351c75;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    color: #351c75;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #351c75;
    color: white;
    width: 100%;
    cursor: pointer;
  }
  </style>
</head>

<body>

<div class="container">

<h1>Contenido secreto </h1>

<p>Aquí va informacion que solo el staff puede saber </p>
<p> Se seguira actualizando proximamente. </p>

<button onclick="window.location.href='miembros.html'">⬅ Volver</button>
<button onclick="logout()">Cerrar sesión</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  }
});

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
