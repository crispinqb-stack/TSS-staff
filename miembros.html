<!DOCTYPE html>
<html>
<head>
  <title>Miembros</title>
</head>
<body>

<h1 id="saludo">Cargando...</h1>
<p>Solo los que iniciaron sesión pueden ver esto </p>

<button onclick="logout()">Cerrar sesión</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  projectId: "tss-members",
  storageBucket: "tss-members.firebasestorage.app",
  messagingSenderId: "472380736056",
  appId: "1:472380736056:web:a9c72354561c9803881ccd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔒 Protección
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    const email = user.email;

    // sacar nombre antes del @
    let nombre = email.split("@")[0];

    // poner primera letra en mayúscula
    nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1);

    document.getElementById("saludo").innerText = "Hola, " + nombre + " 👋";
  }
});

// 🚪 Logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
