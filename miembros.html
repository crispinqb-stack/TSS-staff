<!DOCTYPE html>
<html>
<head>
  <title>STAFF PANEL</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #351c75;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    color: #351c75;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    width: 300px;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #351c75;
    color: white;
    cursor: pointer;
    width: 100%;
  }

  button:hover {
    background: #2a155c;
  }

  #adminPanel button {
    margin-top: 10px;
  }
  </style>

</head>

<body>

<div class="container">

<h1 id="saludo">Cargando...</h1>

<p>Solo el staff puede ver esta informacion</p>

<button onclick="window.location.href='information.html'">
Ver contenido secreto 
</button>

<button onclick="logout()">Cerrar sesión</button>

<!-- 👑 PANEL ADMIN -->
<div id="adminPanel" style="display:none; margin-top:20px;">

  <h3>Panel Admin 👑</h3>
  <p>Solo los Admins pueden ver esto</p>

  <button onclick="alert('Crear contenido 🚀')">
    ➕ Crear contenido
  </button>

  <button onclick="alert('Ver usuarios 👥')">
    👥 Ver usuarios
  </button>

  <button onclick="alert('Configuración ⚙️')">
    ⚙️ Configuración
  </button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  projectId: "tss-members",
  storageBucket: "tss-members.firebasestorage.app",
  messagingSenderId: "472380736056",
  appId: "1:472380736056:web:a9c72354561c9803881ccd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    const email = user.email;

    const admin = "crispin.qb@gmail.com";

    let nombre = email.split("@")[0];
    nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1);

    if (email.trim().toLowerCase() === admin.toLowerCase()) {
      document.getElementById("saludo").innerText = "Admin 👑 " + nombre;
      document.getElementById("adminPanel").style.display = "block";
    } else {
      document.getElementById("saludo").innerText = "Hola, " + nombre + " 👋";
    }
  }
});

// logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
