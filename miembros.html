<!DOCTYPE html>
<html>
<head>
  <title>Miembros</title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #351c75;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #f0f0f0;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    width: 350px;
  }

  h1 {
    color: #351c75;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #351c75;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  #adminPanel {
    margin-top: 20px;
  }
  </style>
</head>

<body>

<div class="container">

<h1 id="saludo">Cargando...</h1>
<p>Bienvenido al STAFF PANEL</p>

<button onclick="window.location.href='information.html'">
🔐 Contenido secreto
</button>

<button onclick="window.location.href='posts.html'">
📝 Ver posts
</button>

<button onclick="window.location.href='chat.html'">
💬 Chat
</button>

<button onclick="logout()">
Cerrar sesión
</button>

<div id="adminPanel" style="display:none;">
  <h3>Admin Panel</h3>

  <button onclick="window.location.href='usuarios.html'">
    👥 Ver usuarios
  </button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 👑 ROLES
const admin = "crispin.qb@gmail.com";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const email = user.email.toLowerCase();
  const nombre = email.split("@")[0];

  // 👋 SALUDO
  document.getElementById("saludo").innerText =
    "Hola, " + nombre + " 👋";

  // 👑 ADMIN PANEL
  if (email === admin.toLowerCase()) {
    document.getElementById("adminPanel").style.display = "block";
  }
});

// 🚪 LOGOUT
window.logout = function() {
  signOut(auth)
    .then(() => {
      window.location.href = "index.html";
    });
}
</script>

</body>
</html>
