<!DOCTYPE html>
<html>
<head>
  <title>POSTS</title>

  <style>
  body {
    font-family: Arial;
    background: #351c75;
    color: white;
    padding: 20px;
  }

  .box {
    background: white;
    color: #351c75;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
  }

  textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #351c75;
    cursor: pointer;
  }
  </style>
</head>

<body>

<h1>POSTS </h1>

<div id="adminPost" style="display:none;">
  <textarea id="texto" placeholder="Escribe algo..."></textarea>
  <button onclick="publicar()">Publicar</button>
</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  databaseURL: "https://tss-members-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const admin = "crispin.qb@gmail.com";

// 🔐 detectar usuario
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    const email = user.email.toLowerCase();

    if (email === admin.toLowerCase()) {
      document.getElementById("adminPost").style.display = "block";
    }
  }
});

// 📝 publicar
window.publicar = function() {
  const texto = document.getElementById("texto").value;

  push(ref(db, 'posts'), {
    texto: texto,
    fecha: Date.now()
  });

  document.getElementById("texto").value = "";
}

// 📊 mostrar posts
onValue(ref(db, 'posts'), (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach((child) => {
    const data = child.val();

    const div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <p>${data.texto}</p>
      <small>${new Date(data.fecha).toLocaleString()}</small>
    `;

    feed.prepend(div);
  });
});
</script>

</body>
</html>
