<!DOCTYPE html>
<html>
<head>
  <title>Usuarios</title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #351c75;
    color: white;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    background: white;
    color: #351c75;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .email {
    font-size: 14px;
    margin-top: 10px;
  }

  .role {
    margin-top: 10px;
    font-weight: bold;
  }

  .date {
    font-size: 12px;
    margin-top: 5px;
    opacity: 0.7;
  }

  .delete {
    margin-top: 10px;
    background: red;
    color: white;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  /* 🔥 POPUP */
  #popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
  }

  #popup .box {
    background: white;
    color: #351c75;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  </style>
</head>

<body>

<h1>Usuarios 👥</h1>

<div class="container" id="lista"></div>

<center>
<button onclick="window.location.href='miembros.html'">⬅ Volver</button>
</center>

<!-- 💀 POPUP -->
<div id="popup">
  <div class="box">
    <p>¿Eliminar usuario? </p>
    <button onclick="confirmarEliminar()">Sí, eliminar</button>
    <button onclick="cerrarPopup()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0yiuq9AQIjYysocDPJIoW4mktfUmMAeY",
  authDomain: "tss-members.firebaseapp.com",
  databaseURL: "https://tss-members-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// 👑 ROLES
const admin = "crispin.qb@gmail.com";
const partners = ["supra080213@gmail.com"];
const workers = ["juandipa@gmail.com"];

const lista = document.getElementById("lista");

let usuarioAEliminar = null;

// 🔐 SOLO ADMIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    const email = user.email.trim().toLowerCase();

    if (email !== admin.toLowerCase()) {
      alert("No tienes acceso ❌");
      window.location.href = "miembros.html";
    } else {
      cargarUsuarios();
    }
  }
});

// 📊 CARGAR
function cargarUsuarios() {
  onValue(ref(db, 'usuarios'), (snapshot) => {
    lista.innerHTML = "";

    snapshot.forEach((child) => {
      const data = child.val();
      const uid = child.key;

      const email = data.email.trim().toLowerCase();
      const nombre = email.split("@")[0];

      let rol = "Usuario 👤";

      if (email === admin.toLowerCase()) {
        rol = "Admin 👑";
      }
      else if (partners.includes(email)) {
        rol = "Partner 🤝";
      }
      else if (workers.includes(email)) {
        rol = "Worker 🛠️";
      }

      let fecha = "Sin fecha";
      if (data.fecha) {
        fecha = new Date(data.fecha).toLocaleString();
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${nombre}</h3>
        <p class="email">${email}</p>
        <p class="role">${rol}</p>
        <p class="date">${fecha}</p>
        <button class="delete" onclick="mostrarPopup('${uid}')">Eliminar 🗑️</button>
      `;

      lista.appendChild(card);
    });
  });
}

// 🔥 POPUP FUNCIONES
window.mostrarPopup = function(uid) {
  usuarioAEliminar = uid;
  document.getElementById("popup").style.display = "flex";
}

window.cerrarPopup = function() {
  document.getElementById("popup").style.display = "none";
}

window.confirmarEliminar = function() {
  remove(ref(db, 'usuarios/' + usuarioAEliminar));
  cerrarPopup();
}
</script>

</body>
</html>
